<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — PigeonFiles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: #0e0e0a;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 215, 0, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 215, 0, 0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            pointer-events: none;
        }

        .blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.06), transparent 70%);
            border-radius: 50%;
            filter: blur(120px);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulseBlob 8s ease-in-out infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes pulseBlob {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.4; }
            100% { transform: translate(-50%, -50%) scale(1.4); opacity: 0.8; }
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(14, 14, 10, 0.6);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255, 215, 0, 0.08);
            border-radius: 48px;
            padding: 60px 50px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 60px rgba(255,215,0,0.02);
            animation: appIn 0.6s ease;
        }

        @keyframes appIn {
            0% { opacity: 0; transform: scale(0.96) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .icon {
            font-size: 80px;
            line-height: 1;
            margin-bottom: 8px;
            display: block;
            animation: floatIcon 4s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .code {
            font-size: 72px;
            font-weight: 800;
            color: #f5d742;
            letter-spacing: -4px;
            line-height: 1;
            margin-bottom: 8px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
        }

        .desc {
            font-size: 16px;
            color: rgba(255,255,255,0.3);
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #f5d742, #eab308);
            color: #0e0e0a;
            font-weight: 700;
            font-size: 16px;
            padding: 14px 36px;
            border-radius: 100px;
            text-decoration: none;
            transition: all 0.25s ease;
            box-shadow: 0 4px 30px rgba(255,215,0,0.08);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(255,215,0,0.18);
            background: linear-gradient(135deg, #fde047, #f5d742);
        }

        .footer {
            margin-top: 28px;
            font-size: 12px;
            color: rgba(255,255,255,0.04);
        }

        .footer a {
            color: rgba(255,215,0,0.08);
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .card {
                padding: 40px 24px;
                border-radius: 32px;
            }
            .code {
                font-size: 56px;
            }
            .icon {
                font-size: 60px;
            }
            .title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="blob"></div>

    <div class="card">
        <span class="icon">🕊️</span>
        <div class="code">404</div>
        <div class="title">Страница не найдена</div>
        <p class="desc">
            Похоже, голубь унёс эту страницу в другое место.<br />
            Но мы поможем тебе вернуться.
        </p>
        <a href="/" class="btn">Вернуться на главную</a>
        <div class="footer">
            <a href="#">PigeonFiles</a> · даже ошибка — с душой
        </div>
    </div>

</body>
</html>
